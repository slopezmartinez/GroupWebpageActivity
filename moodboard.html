<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Harsh Desai — Moodboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Raleway:wght@300;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f1923;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 6px;
      padding: 6px;
      position: relative;
    }

    .photo {
      overflow: hidden;
      position: relative;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: brightness(0.75);
      transition: filter 0.3s;
    }

    .photo:hover img { filter: brightness(0.9); }

    .photo .cap {
      position: absolute;
      bottom: 12px;
      left: 14px;
      font-family: 'Raleway', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #c8aa50;
    }

    /* Center cell — Mood Board text */
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f1923;
      border: 1px solid rgba(200,170,80,0.25);
    }

    .center-title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 52px;
      color: #c8aa50;
      line-height: 1;
      text-align: center;
    }

    .center-name {
      font-family: 'Raleway', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(200,170,80,0.5);
      margin-top: 14px;
      text-align: center;
    }

    .center-line {
      width: 40px;
      height: 1px;
      background: rgba(200,170,80,0.4);
      margin: 10px auto 0;
    }

    .back {
      position: fixed;
      top: 16px; left: 16px;
      font-family: 'Raleway', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #c8aa50;
      text-decoration: none;
      border: 1px solid rgba(200,170,80,0.35);
      padding: 6px 14px;
      z-index: 100;
      background: rgba(15,25,35,0.8);
    }
  </style>
</head>
<body>

  <a href="index.html" class="back">← Back</a>

  <!-- Row 1 -->
  <div class="photo">
    <img src="img/harsh-avatar.png" alt="Harsh" style="object-position: center top;">
    <div class="cap">Harsh Desai</div>
  </div>

  <div class="photo">
    <img src="img/harsh-gym.jpg" alt="Fitness"/>
    <div class="cap">Fitness</div>
  </div>

  <div class="photo">
    <img src="img/harsh-python.jpg" alt="Coding"/>
    <div class="cap">Coding</div>
  </div>

  <!-- Row 2 -->
  <div class="photo">
    <img src="img/harsh-futureairobot.jpg" alt="AI"/>
    <div class="cap">AI</div>
  </div>

  <!-- CENTER CELL -->
  <div class="center">
    <div class="center-title">Mood<br>Board</div>
    <div class="center-line"></div>
    <div class="center-name">Harsh Desai</div>
  </div>

  <div class="photo">
    <img src="img/harsh-cat.png" alt="Cats"/>
    <div class="cap">Gabbana &amp; Dolce</div>
  </div>

</body>
</html>
